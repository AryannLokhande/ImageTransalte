<!DOCTYPE html>
<html>
<head>
<title>AI Image Translator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
background:url("/static/bg.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:800px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{text-align:center;margin-bottom:15px}

.upload-box{
border:2px dashed rgba(255,255,255,0.4);
padding:15px;
border-radius:12px;
text-align:center;
}

button{
margin:5px;
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#4b7bec,#6c5ce7);
color:white;
cursor:pointer;
}

#preview{
display:block;
margin:15px auto;
max-width:350px;
border-radius:10px;
}

.section{margin-top:15px}

.card{
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
margin-top:5px;
}

.translation{
background:rgba(0,0,0,0.5);
padding:8px;
margin-top:5px;
border-radius:6px;
}

#audio button{
background:linear-gradient(45deg,#00c9ff,#92fe9d);
}
</style>
</head>

<body>

<div class="container">

<h1>AI Image Translator</h1>

<div class="upload-box">
<b>Upload OR Capture Image</b><br><br>
<input type="file" id="imageInput"><br>
<button onclick="startCamera()">Open Camera</button>
<button onclick="capture()">Capture</button>
</div>

<video id="camera" autoplay style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<img id="preview">

<div style="text-align:center">
<button onclick="upload()">Translate</button>
</div>

<div id="status" style="text-align:center;margin-top:8px;"></div>

<div class="section">
<b>Detected Objects</b>
<div id="objects" class="card">-</div>
</div>

<div class="section">
<b>Extracted Text</b>
<div id="text" class="card">-</div>
</div>

<div class="section">
<b>Translations</b>
<div id="translations"></div>
</div>

<div class="section">
<b>🔊 Voice Output</b>
<div id="audio"></div>
</div>

</div>

<script>
let stream;

async function startCamera(){
stream=await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById("camera").srcObject=stream;
}

async function capture(){
let video=document.getElementById("camera");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
ctx.drawImage(video,0,0);

document.getElementById("preview").src=canvas.toDataURL("image/jpeg");

canvas.toBlob(blob=>processImage(blob),"image/jpeg");
}

function upload(){
let file=document.getElementById("imageInput").files[0];
if(!file) return alert("Select image");
document.getElementById("preview").src=URL.createObjectURL(file);
processImage(file);
}

async function processImage(file){

document.getElementById("status").innerText="Processing...";

let formData=new FormData();
formData.append("image",file);

let res=await fetch("/process",{method:"POST",body:formData});
let data=await res.json();

document.getElementById("status").innerText="Done";

document.getElementById("objects").innerText =
data.objects.length ? data.objects.join(", ") : "No objects";

document.getElementById("text").innerText =
data.text || "No text found";

let tdiv=document.getElementById("translations");
tdiv.innerHTML="";

for(let lang in data.translations){
let box=document.createElement("div");
box.className="translation";
box.innerHTML="<b>"+lang.toUpperCase()+":</b><br>"+data.translations[lang];
tdiv.appendChild(box);
}

let adiv=document.getElementById("audio");
adiv.innerHTML="";

for(let lang in data.audio){
let btn=document.createElement("button");
btn.innerText="🔊 "+lang;
btn.onclick=()=>new Audio("/audio/"+data.audio[lang]).play();
adiv.appendChild(btn);
}
}
</script>

</body>
</html>
